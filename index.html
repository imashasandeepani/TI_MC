<!DOCTYPE html>
<html>
<head>
<title>Thejana & Imasha Wedding</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    color: white;

    background: url('https://media.istockphoto.com/id/2170322617/photo/cropped-image-of-couple-holding-hands-in-darkroom.jpg?s=612x612&w=0&k=20&c=WnHIwF7ceYWvQoNF1g9NbdIGFR75VkCtp7V2Mzqt0f0=') no-repeat center center fixed;
    background-size: cover;
}

.overlay {
    background: rgba(0,0,0,0.6);
    min-height: 100vh;
    padding: 40px 20px;
}

h1 {
    font-size: 42px;
    margin-bottom: 10px;
}

p {
    font-size: 18px;
    line-height: 1.6;
}

.section {
    margin-top: 25px;
}

.box {
    margin: 20px auto;
    padding: 15px;
    border: 1px solid white;
    display: inline-block;
    border-radius: 10px;
}

img {
    width: 250px;
    border-radius: 15px;
    margin: 10px;
}

button {
    padding: 12px 25px;
    border: none;
    border-radius: 25px;
    background: #e91e63;
    color: white;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
}

input, select, textarea {
    padding: 10px;
    width: 80%;
    max-width: 300px;
    margin: 5px;
    border-radius: 8px;
    border: none;
}
</style>

</head>

<body>

<div class="overlay">

    <!-- NAME -->
    <h1>Thejana ❤ Imasha</h1>

    <!-- ROMANTIC MESSAGE -->
    <div class="section">
        <p>
        “Two hearts that found their home in each other,<br>
        two souls united by love.<br>
        We invite you to witness the beginning of our forever.”
        </p>
    </div>

    <!-- IMAGES -->
    <div class="section">
        <h2>Our Moments 📸</h2>

        <img src="https://media.istockphoto.com/id/2170322617/photo/cropped-image-of-couple-holding-hands-in-darkroom.jpg?s=612x612&w=0&k=20&c=WnHIwF7ceYWvQoNF1g9NbdIGFR75VkCtp7V2Mzqt0f0=">

        <img src="https://tse3.mm.bing.net/th/id/OIP.H976hu5w6oTt5Zv9q6PTPAHaE8?rs=1&pid=ImgDetMain&o=7&rm=3">
    </div>

    <!-- DETAILS -->
    <div class="box section">
        <p>📅 20th May 2026</p>
        <p>⏰ 8.30 AM onwards</p>
        <p>📍 Sawingir Hills, Wisteria Hall, Gonapola</p>
    </div>

    <!-- COUNTDOWN -->
    <div class="section">
        <h2>Countdown 💍</h2>
        <h3 id="countdown"></h3>
    </div>

    <!-- LOCATION -->
    <div class="section">
        <h2>Venue Location 📍</h2>

        <a href="https://www.bing.com/maps?&mepi=58~MapsAnswer~Embedded~Direction_Button&ty=0&rtp=pos.6.763859272003174_80.01305389404297__Gonapola%2C%20Western%20Province%2C%20Sri%20Lanka__e_~&mode=d&v=2&sV=1" target="_blank">
            <button>Open Hotel Location</button>
        </a>
    </div>

    <!-- RSVP -->
    <div class="section">
        <h2>RSVP 💌</h2>

        <input type="text" id="name" placeholder="Your Name"><br>

        <select id="attend">
            <option value="">Will you attend?</option>
            <option>Yes 💍</option>
            <option>No</option>
        </select><br>

        <textarea id="msg" placeholder="Message (optional)"></textarea><br>

        <button onclick="rsvp()">Send RSVP</button>

        <p id="result"></p>
    </div>

</div>

<script>

/* RSVP */
function rsvp() {
    var name = document.getElementById("name").value;
    var attend = document.getElementById("attend").value;

    if(name == "" || attend == "") {
        document.getElementById("result").innerHTML = "⚠ Please fill required fields";
        return;
    }

    document.getElementById("result").innerHTML =
    "💍 Thank you " + name + "! Your RSVP is received!";
}

/* COUNTDOWN */
var weddingDate = new Date("May 20, 2026 08:30:00").getTime();

var x = setInterval(function() {

    var now = new Date().getTime();
    var distance = weddingDate - now;

    var totalSeconds = Math.floor(distance / 1000);

    var months = Math.floor(totalSeconds / (30 * 24 * 60 * 60));
    var days = Math.floor((totalSeconds % (30 * 24 * 60 * 60)) / (24 * 60 * 60));
    var hours = Math.floor((totalSeconds % (24 * 60 * 60)) / (60 * 60));
    var minutes = Math.floor((totalSeconds % (60 * 60)) / 60);
    var seconds = totalSeconds % 60;

    document.getElementById("countdown").innerHTML =
        months + " Months " +
        days + " Days<br>" +
        hours + " Hours " +
        minutes + " Minutes " +
        seconds + " Seconds 💍";

}, 1000);

</script>

</body>
</html>
