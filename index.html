<!DOCTYPE html>
<html>
<head>
<title>Thejana & Imasha Wedding</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    text-align: center;
    color: white;
    font-family: 'Playfair Display', serif;

    /* FIXED BACKGROUND */
    background: url('https://cdn.stillwhite.com/assets/e8/a6/3a/e8a63a12a1f511e9b1880631f3556e6a/1600x.jpg') no-repeat center center fixed;
    background-size: cover;
}

/* MOBILE BACKGROUND FIX */
@media (max-width: 768px) {
    body {
        background-attachment: scroll;
        background-size: cover;
    }
}

/* OVERLAY */
.overlay {
    background: rgba(0,0,0,0.75);
    min-height: 100vh;
    padding: 40px 20px;
}

/* NAME */
.name-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 30px;
    font-size: 42px;
}

.left-name, .right-name {
    font-family: 'Great Vibes', cursive;
}

.ampersand {
    font-size: 28px;
}

/* HEART */
.heart {
    font-size: 26px;
    margin-top: 10px;
    color: white;
    display: inline-block;
    animation: slowZoom 3s ease-in-out infinite;
}

@keyframes slowZoom {
    0% { transform: scale(1); opacity: 0.8; }
    50% { transform: scale(1.25); opacity: 1; }
    100% { transform: scale(1); opacity: 0.8; }
}

/* QUOTE */
.quote {
    font-size: 18px;
    margin-top: 15px;
    line-height: 1.6;
}

/* FOOTER FIX (NO BLUE NUMBERS) */
.footer {
    display: flex;
    justify-content: center;
    gap: 120px;
    margin-top: 60px;
    font-size: 14px;
}

.footer, .footer * {
    color: white !important;
    text-decoration: none !important;
}
</style>

</head>

<body>

<div class="overlay">

    <!-- NAME -->
    <div class="name-row">
        <div class="left-name">Thejana</div>
        <div class="ampersand">&</div>
        <div class="right-name">Imasha</div>
    </div>

    <!-- HEART -->
    <div class="heart">♥</div>

    <!-- QUOTE -->
    <div class="quote">
        “Two hearts that found their home in each other,<br>
        two souls united by love.<br>
        We invite you to witness the beginning of our forever.”
    </div>

    <!-- FOOTER -->
    <div class="footer">
        <div>
            Imasha Sandeepani<br>
            0766167368
        </div>

        <div>
            Thejana Lakshan<br>
            0772348558
        </div>
    </div>

</div>

</body>
</html>
